openapi: 3.1.0
info:
  title: Test API
  description: Testing to4ft
  version: 0.0.1
  license:
    name: MIT
    url: https://nobody.org
servers:
  - url: http://127.0.0.0:3000
tags:
  - name: Users
    description: Operations for users
  - name: Other
    description: other stuff
paths:
  /posts/{postId}:
    get:
      operationId: getPostById
      tags:
        - Posts
      security: []
      summary: GET post endpoint for tson issue
      parameters:
        - $ref: 'components.yaml#/components/parameters/PostIdParam'
      responses:
        $ref: 'components.yaml#/components/responses/TestCompleteResponse'
  /posts:
    get:
      operationId: getPosts
      tags:
        - Posts
      security: []
      summary: GET all posts
      parameters:
        - $ref: 'components.yaml#/components/parameters/PaginationPage'
        - $ref: 'components.yaml#/components/parameters/PaginationLimit'
        - name: tags
          in: query
          description: Tags to filter by
          required: true
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          $ref: 'components.yaml#/components/responses/GetPostsByQuery200Response'
        4xx:
          description: error
    post:
      operationId: putPosts
      tags:
        - Posts
      security: []
      summary: POST a post
      requestBody:
        $ref: 'components.yaml#/components/requestBodies/PostRequestBody'
      responses:
        '200':
          description: result
          content:
            application/json:
              schema:
                $ref: 'components.yaml#/components/schemas/Post'
        4xx:
          description: error
  /users/{userId}:
    get:
      operationId: getUserById
      tags:
        - Users
      security: []
      summary: GET user by id
      parameters:
        - $ref: 'components.yaml#/components/parameters/UserIdParam'
      responses:
        '200':
          description: result
          content:
            application/json:
              schema:
                $ref: 'components.yaml#/components/schemas/User'
        4xx:
          description: error
  /users:
    get:
      operationId: getUsersByQuery
      tags:
        - Users
        - Other
      security: []
      summary: GET user endpoint
      parameters:
        - $ref: components.yaml#/components/parameters/UserQuery
        - $ref: components.yaml#/components/parameters/XTestHeaderParam
      responses:
        '200':
          $ref: 'components.yaml#/components/responses/GetUsersByQuery200Response'
        4xx:
          description: error
    post:
      operationId: postUser
      security: []
      summary: POST user endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: allOf covers genEntriesCode else branch and genValuesCode isArray object branch
              allOf:
                - $ref: 'components.yaml#/components/schemas/PostBody'
          application/xml:
            schema:
              description: allOf covers genValuesCode isArray string branch
              allOf:
                - 'genValuesCode isArray string'
      responses:
        '200':
          $ref: 'components.yaml#/components/responses/GetUsersByQuery200Response'
        4xx:
          description: error
    put:
      operationId: putUser
      security: []
      summary: PUT user endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: allOf covers genEntriesCode tests genEntriesCode type object default branch
              type: object
              properties:
                prop1:
                  type: string
              default:
                prop1: 'test genEntriesCode type object default branch'
      responses:
        '200':
          $ref: 'components.yaml#/components/responses/GetUsersByQuery200Response'
        4xx:
          description: error

  /testParamCode/{authorization}:
    get:
      operationId: testParamErrors
      security: []
      summary: test parameter error cases
      parameters:
        - $ref: 'components.yaml#/components/parameters/TestNoSchemaQuery'
        - $ref: 'components.yaml#/components/parameters/TestInvalidAcceptParam'
        - $ref: 'components.yaml#/components/parameters/TestInvalidContentTypeParam'
        - $ref: 'components.yaml#/components/parameters/TestInvalidAuthorizationParam'
        - $ref: 'components.yaml#/components/parameters/TestArrayPathParam'
        - $ref: 'components.yaml#/components/parameters/TestObjectPathParam'
        - $ref: 'components.yaml#/components/parameters/TestNoPropsObjectPathParam'
        - $ref: 'components.yaml#/components/parameters/TestObjPropObjectPathParam'
      responses:
        '200':
          $ref: 'components.yaml#/components/responses/GetUsersByQuery200Response'
        4xx:
          description: error
  /testPathLevelParams:
    $ref: 'pathItem.yaml'
  /testQueryParameterRefSchemas:
    get:
      operationId: testComboQueryParamsWithObject
      description: >
        This route exists to test a case where a query parameter is from an `allOf`
      tags:
        - Test
      security: []
      parameters:
        - $ref: 'components.yaml#/components/parameters/UserQuery'
        - $ref: 'components.yaml#/components/parameters/TestObjectRefQuery'
      responses:
        '200':
          description: result
          content:
            application/json:
              schema:
                type: array
                items: 
                  $ref: 'components.yaml#/components/responses/GetUsersByQuery200Response'
        '4xx':
            description: error
  /testReqResResponseSchemas:
    get:
      operationId: testReqRes_Ref
      description: >
        This route exists to test a case where request and response objects 
        are defined in the request body and response
      tags:
        - Test
      security: []
      requestBody:
        $ref: components.yaml#/components/requestBodies/TestRequest
      responses:
        '200':
          description: result
          $ref: components.yaml#/components/responses/TestResponse
        '4xx':
            description: error
    patch:
      operationId: testReqRes_RefWithRef
      description: >
        This route exists to test a case where request and response objects 
        are referenced in the request body and response
      tags:
        - Test
      security: []
      requestBody:
        $ref: components.yaml#/components/requestBodies/TestRequestRef
      responses:
        '200':
          description: result
          $ref: components.yaml#/components/responses/TestResponseRef
        '4xx':
            description: error
    post:
      operationId: testReqRes_InlineSchemaObject
      description: >
        This route exists to test a case where request and response objects 
        are inline in the operation object and schemas are defined in the object
      tags:
        - Test
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                req:
                  type: object
                  properties:
                      userId:
                        $ref: components.yaml#/components/schemas/UserId
                      userNm:
                        $ref: components.yaml#/components/schemas/UserNm
      responses:
        '200':
          description: result
          content:
            application/json:
              schema:
                type: object
                properties:
                  res:
                    type: object
                    properties:
                      userId:
                        $ref: components.yaml#/components/schemas/UserId
                      userNm:
                        $ref: components.yaml#/components/schemas/UserNm
        '4xx':
            description: error
    put:
      operationId: testReqRes_InlineWithSchemaRef
      description: >
        This route exists to test a case where request and response objects 
        are inline in the operation object and schemas are refed in the object
      tags:
        - Test
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: components.yaml#/components/schemas/ObjectForTest
      responses:
        '200':
          description: result
          content:
            application/json:
              schema:
                $ref: components.yaml#/components/schemas/ObjectForTest
        '4xx':
            description: error 

